<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%">
  <!-- Definitions for gradients and arrows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1923" />
      <stop offset="100%" stop-color="#16222f" />
    </linearGradient>
    
    <!-- Component Gradients -->
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005b94" />
      <stop offset="100%" stop-color="#0073bb" />
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c7a7b" />
      <stop offset="100%" stop-color="#319795" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dd6b20" />
      <stop offset="100%" stop-color="#ed8936" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" rx="10" fill="url(#bgGrad)" />

  <!-- Title -->
  <text x="300" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    AWS Route53 Clone Architecture
  </text>
  <text x="300" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0aec0" text-anchor="middle">
    System Components &amp; Data Flow
  </text>

  <!-- ================= BROWSER LAYER ================= -->
  <g transform="translate(150, 120)">
    <rect width="300" height="90" rx="8" fill="url(#browserGrad)" stroke="#4a5568" stroke-width="2" />
    <text x="150" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Client Web Browser
    </text>
    <text x="150" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">
      User Interface &amp; Session Management
    </text>
  </g>

  <!-- Connector: Browser -> Frontend -->
  <line x1="300" y1="210" x2="300" y2="280" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="210" y="232" width="180" height="24" rx="4" fill="#1a202c" stroke="#4a5568" stroke-width="1" />
  <text x="300" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="semibold" fill="#cbd5e0" text-anchor="middle">
    HTTP Requests / localhost:3000
  </text>

  <!-- ================= FRONTEND LAYER ================= -->
  <g transform="translate(120, 290)">
    <rect width="360" height="120" rx="8" fill="url(#frontendGrad)" stroke="#2b6cb0" stroke-width="2" />
    <text x="180" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Next.js 14 App Router (Frontend)
    </text>
    <text x="180" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ebf8ff" text-anchor="middle">
      Zustand Store • React Query • Axios Client • Middleware
    </text>
    <line x1="20" y1="80" x2="340" y2="80" stroke="#2b6cb0" stroke-width="1" />
    <text x="180" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#bee3f8" text-anchor="middle" font-style="italic">
      Session tokens synced to "route53-auth" cookie
    </text>
  </g>

  <!-- Connector: Frontend -> Backend -->
  <line x1="300" y1="410" x2="300" y2="480" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="180" y="432" width="240" height="24" rx="4" fill="#1a202c" stroke="#4a5568" stroke-width="1" />
  <text x="300" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="semibold" fill="#cbd5e0" text-anchor="middle">
    JSON API (Authorization: Bearer JWT)
  </text>

  <!-- ================= BACKEND LAYER ================= -->
  <g transform="translate(120, 490)">
    <rect width="360" height="110" rx="8" fill="url(#backendGrad)" stroke="#234e52" stroke-width="2" />
    <text x="180" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      FastAPI App (Backend)
    </text>
    <text x="180" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e6fffa" text-anchor="middle">
      Python REST API • JWT Validation • Router Handlers
    </text>
    <line x1="20" y1="75" x2="340" y2="75" stroke="#234e52" stroke-width="1" />
    <text x="180" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#b2f5ea" text-anchor="middle" font-style="italic">
      Port 8000 • SQLModel ORM Engine
    </text>
  </g>

  <!-- Connector: Backend -> Database -->
  <line x1="300" y1="600" x2="300" y2="660" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ================= DATABASE LAYER ================= -->
  <!-- Cylinder database shape in SVG -->
  <g transform="translate(180, 665)">
    <!-- Top cylinder cap -->
    <path d="M 0 20 A 120 20 0 1 1 240 20 A 120 20 0 1 1 0 20" fill="#dd6b20" stroke="#7b341e" stroke-width="2" />
    <!-- Cylinder body -->
    <path d="M 0 20 L 0 80 A 120 20 0 0 0 240 80 L 240 20 Z" fill="url(#dbGrad)" stroke="#7b341e" stroke-width="2" />
    <path d="M 0 20 A 120 20 0 0 0 240 20" fill="none" stroke="#7b341e" stroke-width="2" />
    <!-- Text -->
    <text x="120" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">
      SQLite DB (route53.db)
    </text>
    <text x="120" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fffff0" text-anchor="middle">
      Tables: users • hosted_zones • dns_records
    </text>
  </g>
</svg>
